services:
  postgres:
    image: postgres:16-alpine
    container_name: hood-terminal-postgres
    environment:
      POSTGRES_DB: hood_terminal
      POSTGRES_USER: hood
      POSTGRES_PASSWORD: hood
    ports:
      - "5432:5432"
    volumes:
      - hood_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hood -d hood_terminal"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hood-terminal-redis
    # Bound memory and evict least-recently-used keys instead of growing without
    # limit (bytecode/log caches have long/no TTLs). Prevents a scheduled OOM on
    # a public, scan-heavy service. Tune maxmemory to the host.
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - hood_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hood_postgres_data:
  hood_redis_data:
